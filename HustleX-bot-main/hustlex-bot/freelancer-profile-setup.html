<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HustleX - Freelancer Profile Setup</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --glass-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary-gradient: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
      --primary-hover: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --error: #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      padding-top: 40px;
      overflow-x: hidden;
      position: relative;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
    }
    body::before { background: rgba(129, 140, 248, 0.2); top: 5%; left: -100px; }
    body::after { background: rgba(192, 132, 252, 0.15); bottom: 5%; right: -100px; }

    .container {
      width: 100%;
      max-width: 600px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      z-index: 1;
    }

    .header { text-align: center; margin-bottom: 24px; }
    .logo {
      font-size: 28px; font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle { font-size: 14px; color: var(--text-muted); }

    /* Progress Bar */
    .progress-container {
      width: 100%; background: rgba(15, 23, 42, 0.6);
      border-radius: 10px; height: 6px; margin-bottom: 30px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: var(--primary-gradient);
      width: 10%; transition: width 0.4s ease;
    }
    .step-title {
      font-size: 18px; font-weight: 600; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .step-count { font-size: 14px; color: var(--accent); font-weight: 500; }

    /* Form Fields */
    .step { display: none; animation: fadeIn 0.4s ease forwards; }
    .step.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .form-group { margin-bottom: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    
    input[type="text"], input[type="email"], input[type="number"], input[type="date"], input[type="url"], select, textarea {
      width: 100%; background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border); padding: 12px 14px;
      border-radius: 12px; font-family: inherit; font-size: 15px; color: var(--text-main);
      outline: none; transition: all 0.25s ease;
    }
    textarea { resize: vertical; min-height: 100px; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
      background: rgba(15, 23, 42, 0.8);
    }
    
    input[type="file"] {
      width: 100%; padding: 10px; background: rgba(15, 23, 42, 0.4);
      border: 1px dashed var(--glass-border); border-radius: 12px; color: var(--text-muted);
    }
    
    .checkbox-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
    .checkbox-container input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
    .checkbox-label { font-size: 14px; color: var(--text-main); }

    /* Dynamic Lists (Experience, Education, etc) */
    .dynamic-list { margin-bottom: 15px; }
    .dynamic-item {
      background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative;
    }
    .remove-btn {
      position: absolute; top: 15px; right: 15px;
      background: rgba(248, 113, 113, 0.1); color: var(--error);
      border: none; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
    }
    .add-btn {
      background: rgba(56, 189, 248, 0.1); color: var(--accent); border: 1px dashed var(--accent);
      padding: 10px; width: 100%; border-radius: 12px; cursor: pointer; font-family: inherit;
      font-weight: 500; transition: all 0.2s;
    }
    .add-btn:hover { background: rgba(56, 189, 248, 0.2); }

    /* Buttons */
    .nav-buttons { display: flex; gap: 12px; margin-top: 30px; }
    .btn {
      flex: 1; padding: 14px; border-radius: 14px; font-family: inherit; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: all 0.25s ease; border: none;
    }
    .btn-prev { background: rgba(255,255,255,0.1); color: var(--text-main); }
    .btn-prev:hover { background: rgba(255,255,255,0.15); }
    .btn-next, .btn-submit { background: var(--primary-gradient); color: white; box-shadow: 0 4px 12px rgba(129, 140, 248, 0.2); }
    .btn-next:hover, .btn-submit:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .error-msg { color: var(--error); font-size: 13px; margin-top: 10px; text-align: center; display: none; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo">HustleX Freelancer</div>
      <div class="subtitle">Complete your professional profile</div>
    </div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <form id="profileForm">
      
      <!-- Step 1: Personal Info -->
      <div class="step active" data-step="1">
        <div class="step-title">Personal Information <span class="step-count">1/10</span></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="full_name" required>
        </div>
        <div class="form-group">
          <label>Username / Display Name</label>
          <input type="text" name="username" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
          </div>
          <div class="form-group">
            <label>Phone Number (Optional)</label>
            <input type="text" name="phone">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Country / Location</label>
            <input type="text" name="country" required>
          </div>
          <div class="form-group">
            <label>Timezone</label>
            <input type="text" name="timezone" placeholder="e.g. UTC+3" required>
          </div>
        </div>
        <div class="form-group">
          <label>Languages Spoken (comma separated)</label>
          <input type="text" name="languages" placeholder="English, Amharic, Spanish" required>
        </div>
      </div>

      <!-- Step 2: Media -->
      <div class="step" data-step="2">
        <div class="step-title">Profile Media <span class="step-count">2/10</span></div>
        <div class="form-group">
          <label>Profile Picture</label>
          <input type="file" name="profile_pic" accept="image/*">
        </div>
        <div class="form-group">
          <label>Cover Image / Banner (Optional)</label>
          <input type="file" name="cover_img" accept="image/*">
        </div>
        <div class="form-group">
          <label>Intro Video URL (YouTube/Vimeo - Optional)</label>
          <input type="url" name="intro_video_url" placeholder="https://youtube.com/...">
        </div>
      </div>

      <!-- Step 3: Summary -->
      <div class="step" data-step="3">
        <div class="step-title">Professional Summary <span class="step-count">3/10</span></div>
        <div class="form-group">
          <label>Professional Headline</label>
          <input type="text" name="headline" placeholder="e.g. Full-Stack Python Developer | Telegram Bot Expert" required>
        </div>
        <div class="form-group">
          <label>Short Bio (150-300 words)</label>
          <textarea name="short_bio" required></textarea>
        </div>
        <div class="form-group">
          <label>Long Bio (Optional)</label>
          <textarea name="long_bio"></textarea>
        </div>
        <div class="form-group">
          <label>Work Philosophy / Approach (Optional)</label>
          <textarea name="philosophy"></textarea>
        </div>
      </div>

      <!-- Step 4: Skills -->
      <div class="step" data-step="4">
        <div class="step-title">Skills & Expertise <span class="step-count">4/10</span></div>
        <div class="form-group">
          <label>Primary Skills (comma separated)</label>
          <input type="text" name="primary_skills" placeholder="Python, React, UI/UX" required>
        </div>
        <div class="form-group">
          <label>Secondary Skills (comma separated)</label>
          <input type="text" name="secondary_skills">
        </div>
        <div class="form-group">
          <label>Tools & Technologies</label>
          <textarea name="tools" placeholder="VS Code, AWS, MongoDB, Docker..."></textarea>
        </div>
      </div>

      <!-- Step 5: Work Experience -->
      <div class="step" data-step="5">
        <div class="step-title">Work Experience <span class="step-count">5/10</span></div>
        <div id="experienceList" class="dynamic-list"></div>
        <button type="button" class="add-btn" onclick="addExperience()">+ Add Experience</button>
      </div>

      <!-- Step 6: Education -->
      <div class="step" data-step="6">
        <div class="step-title">Education <span class="step-count">6/10</span></div>
        <div id="educationList" class="dynamic-list"></div>
        <button type="button" class="add-btn" onclick="addEducation()">+ Add Education</button>
      </div>

      <!-- Step 7: Portfolio -->
      <div class="step" data-step="7">
        <div class="step-title">Portfolio Projects <span class="step-count">7/10</span></div>
        <div id="portfolioList" class="dynamic-list"></div>
        <button type="button" class="add-btn" onclick="addPortfolio()">+ Add Project</button>
      </div>

      <!-- Step 8: Certifications -->
      <div class="step" data-step="8">
        <div class="step-title">Certifications <span class="step-count">8/10</span></div>
        <div id="certificationList" class="dynamic-list"></div>
        <button type="button" class="add-btn" onclick="addCertification()">+ Add Certification</button>
      </div>

      <!-- Step 9: Availability & Social Links -->
      <div class="step" data-step="9">
        <div class="step-title">Availability & Links <span class="step-count">9/10</span></div>
        <div class="form-row">
          <div class="form-group">
            <label>Availability Status</label>
            <select name="availability" required>
              <option value="Available">Available</option>
              <option value="Busy">Busy</option>
              <option value="Not Available">Not Available</option>
            </select>
          </div>
          <div class="form-group">
            <label>Weekly Working Hours</label>
            <input type="number" name="weekly_hours" placeholder="e.g. 40">
          </div>
        </div>
        <div class="form-group">
          <label>Preferred Work Type</label>
          <select name="work_type">
            <option value="Remote">Remote</option>
            <option value="Hybrid">Hybrid</option>
            <option value="On-site">On-site</option>
          </select>
        </div>
        <div class="form-group"><label>GitHub URL</label><input type="url" name="github_url"></div>
        <div class="form-group"><label>LinkedIn URL</label><input type="url" name="linkedin_url"></div>
        <div class="form-group"><label>Portfolio Website</label><input type="url" name="portfolio_url"></div>
      </div>

      <!-- Step 10: Settings -->
      <div class="step" data-step="10">
        <div class="step-title">System Settings <span class="step-count">10/10</span></div>
        <div class="form-group">
          <label>Profile Visibility</label>
          <select name="profile_visibility">
            <option value="Public">Public</option>
            <option value="Private">Private</option>
          </select>
        </div>
        <label class="checkbox-container">
          <input type="checkbox" name="featured_profile">
          <span class="checkbox-label">Apply for Featured Profile status</span>
        </label>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="nav-buttons">
        <button type="button" class="btn btn-prev" id="prevBtn" style="display:none;" onclick="changeStep(-1)">Back</button>
        <button type="button" class="btn btn-next" id="nextBtn" onclick="changeStep(1)">Next</button>
        <button type="submit" class="btn btn-submit" id="submitBtn" style="display:none;">Publish Profile</button>
      </div>
    </form>
  </div>

  <script>
    let currentStep = 1;
    const totalSteps = 10;
    const form = document.getElementById('profileForm');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    const progressBar = document.getElementById('progressBar');
    const errorMsg = document.getElementById('errorMsg');

    // Telegram WebApp init
    let tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      if (tg.setHeaderColor) tg.setHeaderColor('secondary_bg_color');
      const user = tg.initDataUnsafe?.user;
      if (user) {
        document.querySelector('[name="full_name"]').value = [user.first_name, user.last_name].filter(Boolean).join(' ') || '';
        document.querySelector('[name="username"]').value = user.username || '';
      }
    }

    function changeStep(n) {
      const steps = document.querySelectorAll('.step');
      
      // Basic validation before moving next
      if (n == 1) {
        const currentInputs = steps[currentStep-1].querySelectorAll('input[required], select[required], textarea[required]');
        let valid = true;
        currentInputs.forEach(input => { if(!input.value.trim()) valid = false; });
        if(!valid) {
          errorMsg.textContent = 'Please fill all required fields.';
          errorMsg.style.display = 'block';
          return;
        }
      }
      
      errorMsg.style.display = 'none';
      steps[currentStep-1].classList.remove('active');
      currentStep += n;
      
      if (currentStep < 1) currentStep = 1;
      if (currentStep > totalSteps) currentStep = totalSteps;
      
      steps[currentStep-1].classList.add('active');
      progressBar.style.width = `${(currentStep / totalSteps) * 100}%`;
      
      prevBtn.style.display = currentStep == 1 ? 'none' : 'block';
      if (currentStep == totalSteps) {
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'block';
      } else {
        nextBtn.style.display = 'block';
        submitBtn.style.display = 'none';
      }
    }

    // Dynamic Lists Helpers
    function createItemWrapper(html, containerId) {
      const div = document.createElement('div');
      div.className = 'dynamic-item';
      div.innerHTML = html + `<button type="button" class="remove-btn" onclick="this.parentElement.remove()">Remove</button>`;
      document.getElementById(containerId).appendChild(div);
    }

    let expCount = 0;
    function addExperience() {
      const html = `
        <div class="form-group"><label>Job Title</label><input type="text" name="exp_title_${expCount}" required></div>
        <div class="form-group"><label>Company</label><input type="text" name="exp_company_${expCount}" required></div>
        <div class="form-row">
          <div class="form-group"><label>Start Date</label><input type="date" name="exp_start_${expCount}"></div>
          <div class="form-group"><label>End Date</label><input type="date" name="exp_end_${expCount}"></div>
        </div>
        <div class="form-group"><label>Description</label><textarea name="exp_desc_${expCount}"></textarea></div>
      `;
      createItemWrapper(html, 'experienceList');
      expCount++;
    }

    let eduCount = 0;
    function addEducation() {
      const html = `
        <div class="form-group"><label>Degree / Certificate</label><input type="text" name="edu_degree_${eduCount}" required></div>
        <div class="form-group"><label>Institution</label><input type="text" name="edu_school_${eduCount}" required></div>
        <div class="form-row">
          <div class="form-group"><label>Start Year</label><input type="number" name="edu_start_${eduCount}"></div>
          <div class="form-group"><label>End Year</label><input type="number" name="edu_end_${eduCount}"></div>
        </div>
      `;
      createItemWrapper(html, 'educationList');
      eduCount++;
    }

    let portCount = 0;
    function addPortfolio() {
      const html = `
        <div class="form-group"><label>Project Title</label><input type="text" name="port_title_${portCount}" required></div>
        <div class="form-group"><label>Description</label><textarea name="port_desc_${portCount}"></textarea></div>
        <div class="form-group"><label>Live Link / GitHub</label><input type="url" name="port_link_${portCount}"></div>
      `;
      createItemWrapper(html, 'portfolioList');
      portCount++;
    }

    let certCount = 0;
    function addCertification() {
      const html = `
        <div class="form-group"><label>Certificate Name</label><input type="text" name="cert_name_${certCount}" required></div>
        <div class="form-group"><label>Issuing Organization</label><input type="text" name="cert_org_${certCount}"></div>
        <div class="form-group"><label>URL</label><input type="url" name="cert_url_${certCount}"></div>
      `;
      createItemWrapper(html, 'certificationList');
      certCount++;
    }

    // Initialize with 1 empty item each
    addExperience(); addEducation();

    // Form Submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Publishing...';
      
      const formData = new FormData(form);
      formData.append('initData', tg ? tg.initData : '');
      
      // Group dynamic data (we pass it as plain form data and parse on backend)
      formData.append('exp_count', expCount);
      formData.append('edu_count', eduCount);
      formData.append('port_count', portCount);
      formData.append('cert_count', certCount);

      try {
        const response = await fetch('/api/freelancer-profile', {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        if (response.ok) {
          if (tg) {
            tg.showAlert('Profile published successfully!');
            setTimeout(() => tg.close(), 2000);
          } else {
            alert('Profile published successfully!');
          }
        } else {
          throw new Error(data.detail || 'Failed to save profile');
        }
      } catch (err) {
        errorMsg.textContent = `❌ ${err.message}`;
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Publish Profile';
      }
    });
  </script>
</body>
</html>
