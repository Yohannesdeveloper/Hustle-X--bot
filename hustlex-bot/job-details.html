<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HustleX - Job Details</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--tg-theme-bg-color, #0f172a);
      color: var(--tg-theme-text-color, #f8fafc);
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      background: var(--tg-theme-secondary-bg-color, #1e293b);
      padding: 24px;
      border-radius: 16px;
    }
    h1 { margin-top: 0; color: #38bdf8; font-size: 1.4rem; }
    .field { margin-bottom: 14px; }
    .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.04em; }
    .value { font-size: 16px; margin-top: 4px; }
    .loading, .error { text-align: center; padding: 24px; color: #94a3b8; }
    .loading { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #00bcd4;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" class="loading">Loading job details...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="content" style="display:none;">
      <h1 id="jobTitle">Job Details</h1>
      <div class="field"><div class="label">Type</div><div class="value" id="jobType">—</div></div>
      <div class="field"><div class="label">Location</div><div class="value" id="jobLocation">—</div></div>
      <div class="field"><div class="label">Salary</div><div class="value" id="jobSalary">—</div></div>
      <div class="field"><div class="label">Deadline</div><div class="value" id="jobDeadline">—</div></div>
      <div class="field"><div class="label">Company</div><div class="value" id="jobCompany">—</div></div>
      <div class="field"><div class="label">Description</div><div class="value" id="jobDescription">—</div></div>
      <button id="applyBtn" style="display:none;">Open External Link</button>
    </div>
  </div>
  <script>
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const JOB_ID = pathParts[pathParts.length - 1] || '6a31521bf3edf7daab32416c';
    const tg = window.Telegram?.WebApp;
    
    // Always expand Telegram WebApp if available
    if (tg) {
      tg.expand();
    }

    async function loadJob() {
      try {
        console.log('Loading job with ID:', JOB_ID);
        console.log('Current URL:', window.location.href);
        console.log('Telegram WebApp available:', !!tg);
        
        // Add timeout to prevent infinite loading
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
        
        const res = await fetch('/api/jobs/' + JOB_ID, { 
          signal: controller.signal,
          headers: {
            'Accept': 'application/json'
          }
        });
        
        clearTimeout(timeoutId);
        console.log('Response status:', res.status);
        
        const data = await res.json();
        console.log('Response data:', data);
        
        if (!res.ok) throw new Error(data.detail || 'Job not found');

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('jobTitle').textContent = data.job_title || 'Job Opportunity';
        document.getElementById('jobType').textContent = data.job_type || '—';
        document.getElementById('jobLocation').textContent = data.work_location || '—';
        document.getElementById('jobSalary').textContent = data.salary || '—';
        document.getElementById('jobDeadline').textContent = data.deadline || '—';
        document.getElementById('jobCompany').textContent = data.company_name || '—';
        document.getElementById('jobDescription').textContent = data.description || '—';

        if (data.job_link) {
          const btn = document.getElementById('applyBtn');
          btn.style.display = 'block';
          btn.onclick = () => window.open(data.job_link, '_blank');
        }
      } catch (err) {
        console.error('Error loading job:', err);
        document.getElementById('loading').style.display = 'none';
        
        // Show fallback content even on error to prevent stuck screen
        document.getElementById('content').style.display = 'block';
        document.getElementById('jobTitle').textContent = 'Job Opportunity';
        document.getElementById('jobType').textContent = 'Remote';
        document.getElementById('jobLocation').textContent = 'Remote';
        document.getElementById('jobSalary').textContent = 'Negotiable';
        document.getElementById('jobDeadline').textContent = 'Open';
        document.getElementById('jobCompany').textContent = 'HustleX Partner';
        document.getElementById('jobDescription').textContent = 'Job details are currently unavailable. Please try again later or contact support.';
        
        const errEl = document.getElementById('error');
        errEl.style.display = 'block';
        
        if (err.name === 'AbortError') {
          errEl.textContent = 'Request timed out. Showing fallback job information.';
        } else {
          errEl.textContent = 'Could not load job details. Showing fallback information.';
        }
      }
    }

    // Always attempt to load job regardless of authentication state
    // This ensures the page doesn't get stuck on loading spinner
    console.log('Attempting to load job...');
    loadJob();
  </script>
</body>
</html>
